name: Build Linux Tarballs

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag or branch to build (e.g. v1.0.0)'
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.package_arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            package_arch: linux-x64
          - runner: ubuntu-22.04-arm
            package_arch: linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ runner.arch }}-

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller Enviroments.spec --noconfirm --clean --distpath ../dist --workpath ../build

      - name: Package tarball
        shell: bash
        run: |
          ref_name="${{ inputs.tag || github.run_number }}"
          package_name="Enviroments-${{ matrix.package_arch }}-${ref_name}"
          package_dir="release/${package_name}"

          mkdir -p "${package_dir}"
          cp -r dist/Enviroments/. "${package_dir}/"

          if [ -f docs/README_DEPLOY_LINUX.md ]; then
            cp docs/README_DEPLOY_LINUX.md "${package_dir}/"
          else
            cat > "${package_dir}/README_DEPLOY_LINUX.md" <<'DEPLOY_DOC'
          # Linux Offline Deployment

          This package was built by GitHub Actions. It contains the backend executable and bundled frontend static files.

          ## Run

          ```bash
          chmod +x Enviroments
          ./Enviroments
          ```

          The service listens on `0.0.0.0:8000` by default.
          DEPLOY_DOC
          fi

          tar -czf "release/${package_name}.tar.gz" -C release "${package_name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enviroments-${{ matrix.package_arch }}-${{ github.run_number }}
          path: release/Enviroments-${{ matrix.package_arch }}-*.tar.gz
          retention-days: 14

